<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fictodata</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --surface: #ffffff;
            --surface-soft: #f8fbff;
            --text: #21354d;
            --muted: #6b7c93;
            --border: #d9e3ee;
            --primary: #2f5f8c;
            --primary-dark: #264d72;
            --header-top: #3f78a8;
            --header-bottom: #2f5f8c;
            --shadow: 0 8px 24px rgba(33, 53, 77, 0.08);
            --radius: 14px;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        body {
            min-height: 100vh;
        }

        .site-header {
            background: linear-gradient(180deg, var(--header-top) 0%, var(--header-bottom) 100%);
            color: #fff;
            box-shadow: 0 4px 18px rgba(33, 53, 77, 0.14);
        }

        .header-inner {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: 18px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .brand {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .brand-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .brand-subtitle {
            font-size: 13px;
            opacity: 0.95;
        }

        .header-nav {
            display: flex;
            align-items: center;
            gap: 18px;
            font-size: 14px;
            opacity: 0.96;
        }

        .header-nav a {
            color: #fff;
            text-decoration: none;
            white-space: nowrap;
        }

        .header-nav a:hover {
            text-decoration: underline;
        }

        .page-shell {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 48px;
        }

        .container {
            display: none;
        }

        .hero {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 34px 24px;
            text-align: center;
        }

        .hero h1 {
            margin: 0;
            font-size: 34px;
            font-weight: 700;
            color: var(--text);
        }

        .hero-subline {
            width: 76px;
            height: 3px;
            margin: 16px auto 0;
            background: var(--primary);
            border-radius: 999px;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(240px, 1fr));
            gap: 18px;
            margin-top: 30px;
        }

        .nav-tile {
            background: var(--surface-soft);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 22px 18px;
            text-align: left;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            cursor: pointer;
        }

        .nav-tile:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 22px rgba(33, 53, 77, 0.08);
            border-color: #bfd0e0;
        }

        .nav-tile-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--primary);
        }

        .nav-tile-text {
            font-size: 14px;
            line-height: 1.5;
            color: var(--muted);
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 46px;
            min-width: 170px;
            padding: 12px 22px;
            border-radius: 10px;
            border: 1px solid var(--primary);
            background: var(--primary);
            color: #fff;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
        }

        .button:hover {
            background: var(--primary-dark);
            border-color: var(--primary-dark);
            transform: translateY(-1px);
        }

        .button.secondary {
            background: #fff;
            color: var(--primary);
            border-color: #c6d6e5;
        }

        .button.secondary:hover {
            background: var(--surface-soft);
            border-color: #b4c8db;
        }

        .report-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .report-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 18px 22px;
            background: var(--surface-soft);
            border-bottom: 1px solid var(--border);
        }

        .report-title-wrap {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .report-title {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
        }

        .report-accent {
            width: 58px;
            height: 3px;
            background: var(--primary);
            border-radius: 999px;
        }

        .report-body {
            padding: 22px;
        }

        .report-frame {
            position: relative;
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            background: #fff;
        }

        .report-frame iframe {
            display: block;
            width: 100%;
            aspect-ratio: 16 / 10;
            min-height: 470px;
            border: 0;
            background: #fff;
        }

        .powerbi-mask {
            position: absolute;
            left: 0;
            bottom: 0;
            width: clamp(170px, 23vw, 280px);
            height: clamp(36px, 5vw, 56px);
            background: #ffffff;
            z-index: 3;
            pointer-events: none;
        }

        .back-row {
            margin-top: 18px;
            display: flex;
            justify-content: flex-end;
        }

        .site-footer {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto 28px;
            color: var(--muted);
            font-size: 13px;
            text-align: center;
        }

        @media (max-width: 980px) {
            .hero-grid {
                grid-template-columns: 1fr;
            }

            .report-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .back-row {
                justify-content: center;
            }
        }

        @media (max-width: 768px) {
            .header-inner,
            .page-shell,
            .site-footer {
                width: min(100% - 20px, 1180px);
            }

            .header-inner {
                padding: 14px 0;
                flex-direction: column;
                align-items: flex-start;
            }

            .header-nav {
                gap: 12px;
                flex-wrap: wrap;
                font-size: 13px;
            }

            .brand-title {
                font-size: 21px;
            }

            .brand-subtitle {
                font-size: 12px;
            }

            .page-shell {
                padding-top: 18px;
            }

            .hero,
            .report-body {
                padding-left: 16px;
                padding-right: 16px;
            }

            .hero {
                padding-top: 28px;
                padding-bottom: 28px;
            }

            .hero h1 {
                font-size: 28px;
            }

            .report-title {
                font-size: 22px;
            }

            .report-frame iframe {
                min-height: 360px;
            }
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 24px;
            }

            .nav-tile-title {
                font-size: 18px;
            }

            .report-title {
                font-size: 20px;
            }

            .report-frame iframe {
                min-height: 300px;
            }

            .powerbi-mask {
                width: clamp(120px, 40vw, 190px);
                height: 38px;
            }
        }
    </style>
    <script>
        function showPage(pageId) {
            const pages = ["main", "page1", "page2"];
            pages.forEach(function(id) {
                document.getElementById(id).style.display = "none";
            });
            document.getElementById(pageId).style.display = "block";
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        window.addEventListener("DOMContentLoaded", function() {
            showPage("main");
        });
    </script>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="brand">
                <div class="brand-title">Fictodata</div>
                <div class="brand-subtitle">Аналитические отчеты</div>
            </div>

            <nav class="header-nav">
                <a href="#" onclick="showPage('main'); return false;">Главная</a>
                <a href="#" onclick="showPage('page1'); return false;">Резолюции</a>
                <a href="#" onclick="showPage('page2'); return false;">Отчет РП</a>
            </nav>
        </div>
    </header>

    <main class="page-shell">
        <div id="main" class="container">
            <section class="hero">
                <h1>Выберите отчет</h1>
                <div class="hero-subline"></div>

                <div class="hero-grid">
                    <div class="nav-tile" onclick="showPage('page1')">
                        <div class="nav-tile-title">Резолюции</div>
                        <div class="nav-tile-text">Переход к отчету по резолюциям.</div>
                    </div>

                    <div class="nav-tile" onclick="showPage('page2')">
                        <div class="nav-tile-title">Отчет РП</div>
                        <div class="nav-tile-text">Переход к отчету руководителя проекта.</div>
                    </div>
                </div>
            </section>
        </div>

        <div id="page1" class="container">
            <section class="report-card">
                <div class="report-header">
                    <div class="report-title-wrap">
                        <h2 class="report-title">Резолюции</h2>
                        <div class="report-accent"></div>
                    </div>
                </div>
                <div class="report-body">
                    <div class="report-frame">
                        <iframe
                            title="Резолюции РП"
                            src="https://app.powerbi.com/view?r=eyJrIjoiMmUzZjU2ZGQtZTUzMC00ZTlhLWIyODItYTg0NGZkMWRkZmIzIiwidCI6IjZlNzhkOGQ3LTRlNGUtNDMwNC05NmYxLTY5MzQyYzNjMmQzNSIsImMiOjl9"
                            allowfullscreen="true">
                        </iframe>
                        <div class="powerbi-mask" aria-hidden="true"></div>
                    </div>
                    <div class="back-row">
                        <button class="button secondary" onclick="showPage('main')">Назад</button>
                    </div>
                </div>
            </section>
        </div>

        <div id="page2" class="container">
            <section class="report-card">
                <div class="report-header">
                    <div class="report-title-wrap">
                        <h2 class="report-title">Отчет РП</h2>
                        <div class="report-accent"></div>
                    </div>
                </div>
                <div class="report-body">
                    <div class="report-frame">
                        <iframe
                            title="Отчет РП"
                            src="https://app.powerbi.com/view?r=eyJrIjoiMTdmN2NiYzgtOWI5OS00ZTMwLTkzY2MtMzE5OTdiOWY3ODc2IiwidCI6IjZlNzhkOGQ3LTRlNGUtNDMwNC05NmYxLTY5MzQyYzNjMmQzNSIsImMiOjl9"
                            allowfullscreen="true">
                        </iframe>
                        <div class="powerbi-mask" aria-hidden="true"></div>
                    </div>
                    <div class="back-row">
                        <button class="button secondary" onclick="showPage('main')">Назад</button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer class="site-footer">
        © Fictodata
    </footer>
</body>
</html>
